run_name: delta_run
run_description: 'Delta cluster run — full sweep, asyncflow_dragon engine'
workload_id: langgraph_asyncflow
engine_id: asyncflow_dragon

synthetic_adaptive:
  n_of_agents: 2
  backend_slots_sweep: [1, 2, 4, 8]
  n_of_tool_calls_per_agent: 2
  tool_execution_duration_time: 2

throughput_saturation:
  n_of_agents_sweep: [1, 2, 4, 8, 16, 32, 64, 128, 256, 512]
  n_of_backend_slots: 512           # fixed — large enough to never bottleneck backend
  n_of_tool_calls_per_agent: 64
  tool_execution_duration_time: 0   # noop — measures coordination overhead only
