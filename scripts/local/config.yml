run_name: local_debug
run_description: 'Local debug run — small sweep, asyncflow_local engine'
workload_id: langgraph_asyncflow
engine_id: asyncflow_local

synthetic_adaptive:
  n_of_agents: 2
  backend_slots_sweep: [1, 2, 4, 8]
  n_of_tool_calls_per_agent: 2
  tool_execution_duration_time: 1   # seconds; short but non-trivial to exercise scheduling

throughput_saturation:
  n_of_agents_sweep: [1, 2, 4, 8]
  n_of_backend_slots: 8             # small — matches max sweep to avoid over-provisioning
  n_of_tool_calls_per_agent: 4
  tool_execution_duration_time: 0   # noop — measures coordination overhead only
